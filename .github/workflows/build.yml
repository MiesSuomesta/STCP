name: Build STCPv2

on:
  push:
    branches: [main, master, develop]
    paths:
      - "STCPv2/**"
      - ".github/workflows/build.yml"
  pull_request:
    paths:
      - "STCPv2/**"
      - ".github/workflows/build.yml"
  workflow_dispatch:
    inputs:
      build_linux:
        description: Build Linux x86_64 and Raspberry Pi ARM64 modules
        required: false
        type: boolean
        default: true
      build_zephyr:
        description: Build Nordic nRF9151 firmware
        required: false
        type: boolean
        default: true
      build_windows:
        description: Build Windows driver and tools
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: stcpv2-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  validate:
    name: Validate STCPv2
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout STCPv2 only
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false
          submodules: false
          lfs: false
          sparse-checkout: |
            STCPv2
            .github/workflows/build.yml
          sparse-checkout-cone-mode: false

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            shellcheck \
            python3

      - name: Check STCPv2 shell syntax
        shell: bash
        run: |
          set -Eeuo pipefail

          while IFS= read -r -d '' script; do
            echo "bash -n $script"
            bash -n "$script"
          done < <(
            find STCPv2 \
              -path 'STCPv2/kernel-module/raspberry-kernel-sources' -prune -o \
              -path 'STCPv2/zephyr/nordic/ncs-3.3.0' -prune -o \
              -path 'STCPv2/zephyr/nordic-3.4.0' -prune -o \
              -path '*/target' -prune -o \
              -path '*/build' -prune -o \
              -path '*/results' -prune -o \
              -name '*.sh' -type f -print0
          )

      - name: ShellCheck STCPv2 orchestration scripts
        shell: bash
        run: |
          set -Eeuo pipefail

          scripts=(
            STCPv2/kernel-module/build-and-deploy.sh
            STCPv2/kernel-module/build-benchmark-publish.sh
            STCPv2/kernel-module/build-rpi-package.sh
            STCPv2/kernel-module/benchmark/run-all-full.sh
            STCPv2/web/publish-latest.sh
          )

          existing=()
          for script in "${scripts[@]}"; do
            [[ -f "$script" ]] && existing+=("$script")
          done

          if ((${#existing[@]})); then
            shellcheck --severity=error -x "${existing[@]}"
          fi

      - name: Check STCPv2 Python syntax
        shell: bash
        run: |
          set -Eeuo pipefail

          dirs=()
          [[ -d STCPv2/kernel-module/benchmark ]] &&
            dirs+=(STCPv2/kernel-module/benchmark)
          [[ -d STCPv2/kernel-module/echo-server ]] &&
            dirs+=(STCPv2/kernel-module/echo-server)

          if ((${#dirs[@]})); then
            python3 -m compileall -q "${dirs[@]}"
          fi

  linux-kernel-modules:
    name: Linux x86_64 + Raspberry Pi ARM64
    needs: validate
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.build_linux == true
    runs-on: [self-hosted, linux, x64, stcp-builder]
    timeout-minutes: 150

    defaults:
      run:
        shell: bash
        working-directory: STCPv2/kernel-module

    env:
      CROSS_COMPILE: aarch64-linux-gnu-
      CARRIER_DEBUG: "0"
      STOP_BENCHMARKS: "0"
      DRY_RUN: "0"

    steps:
      - name: Checkout STCPv2 only
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false
          submodules: false
          lfs: false
          sparse-checkout: |
            STCPv2
            .github/workflows/build.yml
          sparse-checkout-cone-mode: false

      - name: Resolve kernel build trees
        run: |
          set -Eeuo pipefail

          X86_KDIR="${{ vars.STCP_X86_KDIR }}"
          RPI_KDIR="${{ vars.STCP_RPI_KDIR }}"

          if [[ -z "$X86_KDIR" ]]; then
            X86_KDIR="/lib/modules/$(uname -r)/build"
          fi

          if [[ -z "$RPI_KDIR" ]]; then
            RPI_KDIR="$GITHUB_WORKSPACE/STCPv2/kernel-module/raspberry-kernel-sources"
          fi

          {
            echo "X86_KDIR=$X86_KDIR"
            echo "RPI_KDIR=$RPI_KDIR"
            echo "JOBS=$(nproc)"
          } >> "$GITHUB_ENV"

          test -f "$X86_KDIR/Makefile"
          test -f "$RPI_KDIR/Makefile"
          test -f "$RPI_KDIR/Module.symvers"

      - name: Verify Linux build environment
        run: |
          set -Eeuo pipefail

          commands=(
            make rustup cargo rustc file modinfo
            "${CROSS_COMPILE}gcc"
            "${CROSS_COMPILE}ld"
            "${CROSS_COMPILE}ar"
            "${CROSS_COMPILE}readelf"
          )

          for command_name in "${commands[@]}"; do
            command -v "$command_name"
          done

          uname -a
          rustc --version
          cargo --version
          make --version | head -1
          "${CROSS_COMPILE}gcc" --version | head -1

      - name: Ensure Rust nightly and rust-src
        run: |
          set -Eeuo pipefail

          if ! rustup toolchain list | grep -q '^nightly'; then
            rustup toolchain install nightly --profile minimal
          fi

          rustup component add rust-src --toolchain nightly

      - name: Build Linux modules
        run: |
          set -Eeuo pipefail

          X86_KDIR="$X86_KDIR" \
          RPI_KDIR="$RPI_KDIR" \
          CROSS_COMPILE="$CROSS_COMPILE" \
          JOBS="$JOBS" \
          STOP_BENCHMARKS="$STOP_BENCHMARKS" \
          CARRIER_DEBUG="$CARRIER_DEBUG" \
          DRY_RUN="$DRY_RUN" \
            bash ./build-and-deploy.sh build

      - name: Verify produced modules
        run: |
          set -Eeuo pipefail

          x86_module="x86-kernel-module/stcp.ko"
          rpi_module="raspberry-kernel-module/stcp.ko"

          test -f "$x86_module"
          test -f "$rpi_module"

          file "$x86_module" | grep -Eq 'x86-64|x86_64'
          "${CROSS_COMPILE}readelf" -h "$rpi_module" |
            grep -q 'Machine:.*AArch64'

          modinfo "$x86_module" |
            grep -E '^(description|license|depends|name|vermagic):'

          modinfo "$rpi_module" |
            grep -E '^(description|license|depends|name|vermagic):'

      - name: Package Linux artifacts
        run: |
          set -Eeuo pipefail

          rm -rf ci-artifacts
          mkdir -p \
            ci-artifacts/x86_64 \
            ci-artifacts/raspberry-pi-arm64

          cp x86-kernel-module/stcp.ko \
            ci-artifacts/x86_64/stcp.ko

          cp raspberry-kernel-module/stcp.ko \
            ci-artifacts/raspberry-pi-arm64/stcp.ko

          [[ -f x86-kernel-module/Module.symvers ]] &&
            cp x86-kernel-module/Module.symvers ci-artifacts/x86_64/

          [[ -f raspberry-kernel-module/Module.symvers ]] &&
            cp raspberry-kernel-module/Module.symvers \
              ci-artifacts/raspberry-pi-arm64/

          modinfo x86-kernel-module/stcp.ko \
            > ci-artifacts/x86_64/modinfo.txt

          modinfo raspberry-kernel-module/stcp.ko \
            > ci-artifacts/raspberry-pi-arm64/modinfo.txt

          (
            cd ci-artifacts
            sha256sum \
              x86_64/stcp.ko \
              raspberry-pi-arm64/stcp.ko \
              > SHA256SUMS
          )

      - name: Upload Linux modules
        uses: actions/upload-artifact@v4
        with:
          name: stcpv2-linux-modules-${{ github.sha }}
          path: STCPv2/kernel-module/ci-artifacts/
          if-no-files-found: error
          retention-days: 14

  zephyr-nordic:
    name: Zephyr / Nordic nRF9151
    needs: validate
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.build_zephyr == true
    runs-on: [self-hosted, linux, x64, stcp-zephyr]
    timeout-minutes: 120

    env:
      BOARD: nrf9151dk/nrf9151

    steps:
      - name: Checkout STCPv2 only
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false
          submodules: false
          lfs: false
          sparse-checkout: |
            STCPv2
            .github/workflows/build.yml
          sparse-checkout-cone-mode: false

      - name: Resolve Nordic paths
        id: paths
        shell: bash
        run: |
          set -Eeuo pipefail

          app=""
          for candidate in \
            "$GITHUB_WORKSPACE/STCPv2/zephyr/nordic/stcp-mqtt" \
            "$GITHUB_WORKSPACE/STCPv2/kernel-module/stcp-mqtt"; do
            if [[ -f "$candidate/CMakeLists.txt" &&
                  -f "$candidate/prj.conf" ]]; then
              app="$candidate"
              break
            fi
          done

          [[ -n "$app" ]] || {
            echo "Zephyr application not found" >&2
            exit 1
          }

          ncs_root="${{ vars.STCP_NCS_ROOT }}"
          if [[ -z "$ncs_root" ]]; then
            ncs_root="$GITHUB_WORKSPACE/STCPv2/zephyr/nordic/ncs-3.3.0"
          fi

          [[ -d "$ncs_root" ]] || {
            echo "Nordic NCS workspace not found: $ncs_root" >&2
            echo "Set repository variable STCP_NCS_ROOT." >&2
            exit 1
          }

          echo "app=$app" >> "$GITHUB_OUTPUT"
          echo "ncs_root=$ncs_root" >> "$GITHUB_OUTPUT"

      - name: Verify Nordic environment
        shell: bash
        working-directory: ${{ steps.paths.outputs.ncs_root }}
        run: |
          set -Eeuo pipefail
          command -v west
          west topdir
          west zephyr-export

      - name: Build nRF9151 firmware
        shell: bash
        working-directory: ${{ steps.paths.outputs.ncs_root }}
        run: |
          set -Eeuo pipefail

          west build \
            --pristine=always \
            --board "$BOARD" \
            --source-dir "${{ steps.paths.outputs.app }}" \
            --build-dir "$GITHUB_WORKSPACE/build-zephyr-nrf9151"

      - name: Upload Zephyr firmware
        uses: actions/upload-artifact@v4
        with:
          name: stcpv2-zephyr-nrf9151-${{ github.sha }}
          path: |
            build-zephyr-nrf9151/zephyr/*.hex
            build-zephyr-nrf9151/zephyr/*.bin
            build-zephyr-nrf9151/zephyr/*.elf
            build-zephyr-nrf9151/zephyr/*.map
            build-zephyr-nrf9151/zephyr/.config
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows x64 driver
    needs: validate
    if: >-
      github.event_name != 'workflow_dispatch' ||
      inputs.build_windows == true
    runs-on: [self-hosted, windows, x64, stcp-windows]
    timeout-minutes: 120

    steps:
      - name: Checkout STCPv2 only
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          clean: false
          submodules: false
          lfs: false
          sparse-checkout: |
            STCPv2
            .github/workflows/build.yml
          sparse-checkout-cone-mode: false

      - name: Locate Windows solution
        id: solution
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $candidates = @(
            "STCPv2/windows/STCP-Windows.sln",
            "STCPv2/Windows/STCP-Windows.sln"
          )

          foreach ($candidate in $candidates) {
            if (Test-Path $candidate) {
              "path=$candidate" |
                Out-File -FilePath $env:GITHUB_OUTPUT -Append
              exit 0
            }
          }

          throw "STCP-Windows.sln was not found"

      - name: Locate MSBuild
        id: msbuild
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe was not found"
          }

          $installPath = & $vswhere `
            -latest `
            -products * `
            -requires Microsoft.Component.MSBuild `
            -property installationPath

          if (-not $installPath) {
            throw "Visual Studio with MSBuild was not found"
          }

          $msbuild = Join-Path $installPath "MSBuild\Current\Bin\MSBuild.exe"
          if (-not (Test-Path $msbuild)) {
            throw "MSBuild.exe was not found: $msbuild"
          }

          "path=$msbuild" |
            Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify WDK integration
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $wdkBuild = "${env:ProgramFiles(x86)}\Windows Kits\10\build"
          if (-not (Test-Path $wdkBuild)) {
            throw "WDK build directory was not found"
          }

          $targets = Get-ChildItem `
            $wdkBuild `
            -Recurse `
            -Filter "WindowsDriver.*.targets" `
            -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $targets) {
            throw "WDK MSBuild integration was not found"
          }

      - name: Build Windows solution
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          & "${{ steps.msbuild.outputs.path }}" `
            "${{ steps.solution.outputs.path }}" `
            /m `
            /restore `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /verbosity:minimal

          if ($LASTEXITCODE -ne 0) {
            throw "MSBuild failed with exit code $LASTEXITCODE"
          }

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stcpv2-windows-x64-${{ github.sha }}
          path: |
            STCPv2/windows/**/*.sys
            STCPv2/windows/**/*.dll
            STCPv2/windows/**/*.exe
            STCPv2/windows/**/*.inf
            STCPv2/windows/**/*.cat
            STCPv2/windows/**/*.pdb
            STCPv2/Windows/**/*.sys
            STCPv2/Windows/**/*.dll
            STCPv2/Windows/**/*.exe
            STCPv2/Windows/**/*.inf
            STCPv2/Windows/**/*.cat
            STCPv2/Windows/**/*.pdb
          if-no-files-found: error
          retention-days: 14
