# =========================================================
# FLASH
# =========================================================
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y
# =========================================================
# MINIMAL SYSTEM
# =========================================================
CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# =========================================================
# LOGGING (minimal)
# =========================================================
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# =========================================================
# LTE LINK CONTROL DEBUG
# =========================================================
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_DBG=y

# =========================================================
# AT MONITOR
# =========================================================
CONFIG_AT_MONITOR=y
CONFIG_AT_MONITOR_LOG_LEVEL_DBG=y

# =========================================================
# MODEM / Nordic
# =========================================================
CONFIG_NRF_MODEM_LIB=y
CONFIG_MODEM_INFO=y

# =========================================================
# MODEM / Link control
# =========================================================
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LC_PDN_MODULE=y

# =========================================================
# NETWORK (FIXED)
# =========================================================
CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_CONFIG_SETTINGS=y

# =========================================================
# MQTT flags
# =========================================================
CONFIG_MQTT_CLEAN_SESSION=y

# =========================================================
# STACKS
# =========================================================
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=2048

CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_MAIN_STACK_SIZE=3000
CONFIG_HEAP_MEM_POOL_SIZE=30546

CONFIG_AT_MONITOR_HEAP_SIZE=2048

# =========================================================
# DNS
# =========================================================
CONFIG_DNS_RESOLVER=y
CONFIG_LTE_LC_DNS_FALLBACK_MODULE=y
CONFIG_LTE_LC_DNS_FALLBACK_ADDRESS="8.8.8.8"
CONFIG_DNS_RESOLVER_ADDITIONAL_QUERIES=2
CONFIG_DNS_SERVER_IP_ADDRESSES=y
CONFIG_DNS_SERVER1="8.8.8.8"
CONFIG_DNS_SERVER2="1.1.1.1"

# =========================================================
# STCP
# =========================================================
CONFIG_STCP=y
CONFIG_STCP_DEBUG=y
CONFIG_STCP_DEBUG_LATENCY=n
CONFIG_STCP_SELFTEST=n

CONFIG_DEBUG_OPTIMIZATIONS=n
CONFIG_SYMTAB=y

# Watchdog
CONFIG_STCP_WATCHDOG_ENABLE=n
CONFIG_STCP_WATCHDOG_MAX_TIMEOUT=120
CONFIG_STCP_WATCHDOG_CHECK_INTERVAL=15

# AES
CONFIG_STCP_AES_BYPASS=n

# MQTT
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_STCP=y

# Status monitor
CONFIG_STCP_STATUS_MONITOR=n
CONFIG_STCP_STATUS_MONITOR_STATISTICS=n
CONFIG_STCP_STATUS_MONITOR_LOG_INTERVAL=2

# Thread analyzer
CONFIG_THREAD_STACK_INFO=y
CONFIG_INIT_STACKS=y
CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_AUTO=y

# APN
CONFIG_STCP_LTE_APN_NAME="internet"

# Connection target
CONFIG_STCP_CONNECT_TO_HOST="80.186.162.127"
CONFIG_STCP_CONNECT_TO_PORT=7777

# =========================================================
# TESTING
# =========================================================
CONFIG_STCP_TESTING=n
CONFIG_STCP_TESTING_LOG=n
CONFIG_STCP_TESTING_LOG_COMPLETELY_OFF=n

CONFIG_STCP_TESTING_PEER_HOSTNAME_TO_CONNECT="80.186.162.127"
CONFIG_STCP_TESTING_PEER_PORT_TO_CONNECT=7777
CONFIG_STCP_TESTING_PAYLOAD_FORMAT="TErveppä terve! %Y-%m-%d %H:%M:%S ..."
CONFIG_STCP_TESTING_MODE=2

# =========================================================
# TIME
# =========================================================
CONFIG_DATE_TIME=y

# =========================================================
# OPTIMISATIONS
# =========================================================
CONFIG_NET_BUF_RX_COUNT=8
CONFIG_NET_BUF_TX_COUNT=8
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_MAX_CONTEXTS=4

CONFIG_NET_LOG=n
CONFIG_NET_TCP_LOG_LEVEL_OFF=y
CONFIG_NET_UDP_LOG_LEVEL_OFF=y
CONFIG_NVS=y
