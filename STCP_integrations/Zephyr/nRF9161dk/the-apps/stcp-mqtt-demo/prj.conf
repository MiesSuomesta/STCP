# =========================================================
# UART
# =========================================================
CONFIG_SERIAL=y

# =========================================================
# Logging
# =========================================================
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y
CONFIG_LOG_PRINTK=n
CONFIG_LOG_BUFFER_SIZE=2048

CONFIG_PRINTK=n
CONFIG_EARLY_CONSOLE=n
CONFIG_STDOUT_CONSOLE=n

# =========================================================
# Console + shell
# =========================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_SHELL_LOG_BACKEND=n

# =========================================================
# Tracing (modeemitrace RAMiin)
# =========================================================
CONFIG_TRACING=y
CONFIG_TRACING_BACKEND_UART=n
CONFIG_TRACING_SYNC=y

CONFIG_NRF_MODEM_LIB_TRACE=y
CONFIG_NRF_MODEM_LIB_TRACE_BACKEND_RAM=y
CONFIG_NRF_MODEM_LIB_TRACE_BACKEND_RAM_LENGTH=32768

# =========================================================
# Disable other log backends
# =========================================================
CONFIG_LOG_BACKEND_RTT=n

# =========================================================
# Networking core
# =========================================================
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n

CONFIG_PDN=y

CONFIG_DNS_RESOLVER=y
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_AUTO_INIT=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=60

# =========================================================
# Sockets
# =========================================================
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POSIX_NAMES=y

CONFIG_NET_BUF_RX_COUNT=8
CONFIG_NET_BUF_TX_COUNT=8

CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4

CONFIG_ZVFS_OPEN_MAX=16
CONFIG_NET_SOCKETS_POLL_MAX=16

# =========================================================
# Offload sockets (nRF9161 modem)
# =========================================================
CONFIG_NET_OFFLOAD=y
CONFIG_NET_SOCKETS_OFFLOAD=y

# =========================================================
# LTE / modem
# =========================================================
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_DBG=y

CONFIG_NRF_MODEM_LIB=y
CONFIG_LTE_LC_TRACE=y
CONFIG_PDN_ESM_STRERROR=y

CONFIG_MODEM_KEY_MGMT=y

# =========================================================
# POSIX subset
# =========================================================
CONFIG_POLL=y
CONFIG_EVENTFD=y

# =========================================================
# Crypto (nRF9161 HW)
# =========================================================
CONFIG_NRF_SECURITY=y
CONFIG_PSA_CRYPTO_DRIVER_CC3XX=y

CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_NRF5_RNG=y
CONFIG_NRFX_RNG=y

# =========================================================
# Memory
# =========================================================
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_HEAP_MEM_POOL_SIZE=16384

CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_AT_MONITOR_HEAP_SIZE=4096

# =========================================================
# Debug
# =========================================================
CONFIG_INIT_STACKS=y
CONFIG_STACK_SENTINEL=y
CONFIG_THREAD_STACK_INFO=y

CONFIG_SYS_HEAP_RUNTIME_STATS=y
CONFIG_SYS_HEAP_LISTENER=y
CONFIG_SYS_HEAP_VALIDATE=y

CONFIG_ASSERT=n
CONFIG_DEBUG_OPTIMIZATIONS=y

CONFIG_CBPRINTF_COMPLETE=n

# =========================================================
# STCP
# =========================================================
CONFIG_STCP=y
CONFIG_STCP_DEBUG=y
CONFIG_STCP_AES_BYPASS=n

# =========================================================
# MQTT
# =========================================================
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_STCP=y
