# =========================================================
# MINIMAL SYSTEM
# =========================================================

CONFIG_PRINTK=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# =========================================================
# LOGGING (minimal)
# =========================================================

CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_IMMEDIATE=y

# =========================================================
# LTE LINK CONTROL DEBUG
# =========================================================
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_DBG=y

# =========================================================
# AT MONITOR (optional but useful)
# =========================================================

CONFIG_AT_MONITOR=y
CONFIG_AT_MONITOR_LOG_LEVEL_DBG=y

# =========================================================
# MODEM / Nordic
# =========================================================

CONFIG_NRF_MODEM_LIB=y
CONFIG_MODEM_INFO=y

# =========================================================
# MODEM / Link control
# =========================================================
CONFIG_LTE_LINK_CONTROL=y
CONFIG_LTE_LINK_CONTROL_LOG_LEVEL_DBG=y

# =========================================================
# NETWORK
# =========================================================

CONFIG_NETWORKING=y
CONFIG_NET_SOCKETS=y

# =========================================================
# Stacks
# =========================================================
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=2048

CONFIG_MAIN_STACK_SIZE=10240
CONFIG_HEAP_MEM_POOL_SIZE=10240

#CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096
#CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096

CONFIG_AT_MONITOR_HEAP_SIZE=4096


# =========================================================
# DNS
# =========================================================

CONFIG_DNS_RESOLVER=y

# STCP
CONFIG_STCP=y
CONFIG_STCP_DEBUG=n
CONFIG_STCP_DEBUG_LATENCY=n
CONFIG_STCP_SELFTEST=n

# STCP / Watchdog
CONFIG_STCP_WATCHDOG_ENABLE=y
CONFIG_STCP_WATCHDOG_MAX_TIMEOUT=300
CONFIG_STCP_WATCHDOG_CHECK_INTERVAL=15

# STCP / AES
CONFIG_STCP_AES_BYPASS=y

# STCP / MQTT
CONFIG_MQTT_LIB=y
CONFIG_MQTT_LIB_STCP=y

# STCP ISP's APN name
CONFIG_STCP_LTE_APN_NAME="internet"

# STCP networking: Where to connect
CONFIG_STCP_CONNECT_TO_HOST="lja.fi"
CONFIG_STCP_CONNECT_TO_PORT="7777"

# optimisations here
CONFIG_NET_BUF_RX_COUNT=8
CONFIG_NET_BUF_TX_COUNT=8
CONFIG_NET_PKT_RX_COUNT=4
CONFIG_NET_PKT_TX_COUNT=4
CONFIG_NET_MAX_CONTEXTS=4
CONFIG_NET_NATIVE=n
CONFIG_NET_OFFLOAD=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_LOG=n
CONFIG_NET_TCP_LOG_LEVEL_OFF=y
CONFIG_NET_UDP_LOG_LEVEL_OFF=y

