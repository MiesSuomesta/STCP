[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "relocation-model=static",
    "-C", "code-model=kernel",
    "-C", "panic=abort",
    "-C", "force-frame-pointers=yes",
    "-C", "no-redzone=yes",
    "-C", "target-feature=-mmx,-sse,-sse2,+soft-float",
]

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
