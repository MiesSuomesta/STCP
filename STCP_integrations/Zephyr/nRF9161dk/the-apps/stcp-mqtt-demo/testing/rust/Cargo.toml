[package]
name = "stcp-test-server"
version = "0.1.0"
edition = "2024"

[dependencies]
the_stcp_kernel_module = { path = "../../../../modules/stcp/rust/", features = ["std", "stcp_debug"] }
p256 = { version = "0.13", features = ["ecdh"] }
rand = "0.8"
rand_core = "0.10.0"
env = "1.0.1"
nix = { version = "0.31.2", features = ["poll"] }

[features]
stcp_debug = []
std = []


[profile.release]
opt-level = "z"
lto = true
panic = "abort"
codegen-units = 1

[profile.dev]
opt-level = "z"
lto = true
panic = "abort"
codegen-units = 1

