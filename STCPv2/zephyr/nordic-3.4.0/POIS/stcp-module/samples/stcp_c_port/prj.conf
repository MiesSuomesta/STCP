CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_STCP=y
CONFIG_STCP_LOG_LEVEL=4
CONFIG_LOG=y
CONFIG_PRINTK=y
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384

# Test target; override with west build -- -DCONFIG_STCP_TEST_REMOTE_IPV4=\"x.x.x.x\"
CONFIG_STCP_TEST_REMOTE_IPV4="192.168.1.100"
CONFIG_STCP_TEST_REMOTE_PORT=6677
CONFIG_STCP_TEST_MESSAGE="Hello from STCP on Zephyr"
CONFIG_STCP_TEST_RECV_TIMEOUT_MS=10000
